<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ask Matchn - PlayPal Admin</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <style>
        .filters {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .table-wrap { overflow: auto; max-height: 72vh; }
        .message-cell, .answer-cell {
            max-width: 360px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .pill {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
        }
        .pill-pending { background: #fef3c7; border-color: #fcd34d; color: #92400e; }
        .pill-answered { background: #dcfce7; border-color: #86efac; color: #166534; }
        .answer-form textarea {
            width: 100%;
            min-height: 72px;
            margin-top: 0.35rem;
            resize: vertical;
        }
        .muted { color: var(--color-text-secondary); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Ask Matchn — Custom requests</h1>
        <div class="header-actions">
            <span id="admin-name"></span>
            <button class="btn btn-secondary" onclick="navigate('/ask-matchn-knowledge')">Edit FAQ tree</button>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <p class="muted">Custom questions from group admins. Answers appear in the app when admins open Ask Matchn again.</p>
        <div class="filters">
            <label for="filter-status">Status</label>
            <select id="filter-status" class="form-input" style="width: auto;">
                <option value="all">All</option>
                <option value="pending" selected>Pending</option>
                <option value="answered">Answered</option>
            </select>
            <button class="btn btn-primary" id="btn-refresh" type="button">Refresh</button>
            <span id="meta" class="muted"></span>
        </div>

        <div id="loading" class="muted">Loading…</div>
        <div id="table-wrap" class="table-wrap" style="display: none;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>When</th>
                        <th>Group</th>
                        <th>Asked by</th>
                        <th>Question</th>
                        <th>Status</th>
                        <th>Answer</th>
                    </tr>
                </thead>
                <tbody id="requests-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/dbTarget.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/adminShell.js"></script>
    <script src="../js/askMatchn.js"></script>
    <script>
        if (!isAuthenticated()) {
            navigate('/login');
        } else {
            const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
            document.getElementById('admin-name').textContent = adminUser.name || adminUser.email || 'Admin';
            initAskMatchnPage();
        }
    </script>
</body>
</html>
