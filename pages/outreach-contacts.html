<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Outreach contacts - PlayPal Admin</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div class="header">
        <h1>Outreach</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container page-wrap">
        <div id="error-message" class="error" style="display: none;"></div>
        <div id="success-message" class="success" style="display: none;"></div>

        <p class="page-lead">
            People to reach outside the app. Tap phone to call, Instagram to open profile.
        </p>

        <div class="add-panel">
            <h3>Add contact</h3>
            <div class="add-grid">
                <div class="field field-full">
                    <label for="add-name">Name *</label>
                    <input id="add-name" class="form-input" type="text" maxlength="120" placeholder="Full name" autocomplete="name" />
                </div>
                <div class="field">
                    <label for="add-phone">Phone</label>
                    <input id="add-phone" class="form-input" type="tel" maxlength="40" placeholder="+972 50 123 4567" autocomplete="tel" />
                </div>
                <div class="field">
                    <label for="add-instagram">Instagram</label>
                    <input id="add-instagram" class="form-input" type="text" maxlength="120" placeholder="@handle or link" />
                </div>
                <div class="field field-full">
                    <label for="add-status">Status</label>
                    <select id="add-status" class="form-input">
                        <option value="still_nothing">Still nothing</option>
                        <option value="spoke_with">Spoke with</option>
                        <option value="rejected">Rejected our request</option>
                        <option value="approved">Approved our request</option>
                    </select>
                </div>
            </div>
            <button id="btn-add" class="btn btn-primary" type="button" style="width:100%; margin-top:0.5rem;" onclick="createContact()">Add contact</button>
        </div>

        <div class="toolbar">
            <input id="search-input" class="form-input" type="search" placeholder="Search name, phone, IG…" />
            <button class="btn btn-secondary" type="button" onclick="loadContacts()">Refresh</button>
        </div>

        <div id="status-chips" class="status-chips"></div>
        <div id="list-meta" class="muted" style="margin-bottom:0.5rem;">Loading…</div>
        <div id="list-loading" class="loading">Loading contacts…</div>
        <div id="contact-list" class="contact-list" style="display:none;"></div>
        <div id="empty-state" class="empty-state" style="display:none;">No contacts yet. Add someone above.</div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/dbTarget.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/adminShell.js"></script>
    <script src="../js/outreach-contacts.js"></script>
    <script>
        if (!isAuthenticated()) {
            navigate('/login');
        } else {
            initOutreachContacts();
        }
    </script>
</body>
</html>
