<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Spotlight - PlayPal Admin</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <style>
        .muted { color: var(--color-text-secondary); font-size: .88rem; }
        .table-wrap { overflow: auto; max-height: 62vh; }
        .btn-sm { padding: .35rem .65rem; font-size: .85rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Community social spotlight</h1>
        <div class="header-actions">
            <span id="admin-name" style="color: var(--color-text); font-weight: 500; margin-right: 1rem;"></span>
            <button class="btn btn-secondary" onclick="navigate('/dashboard')">Back to Dashboard</button>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div id="error-message" class="error" style="display:none;"></div>
        <p class="muted" style="margin-bottom: 1rem;">
            Photos submitted by <strong>group admins</strong> from the community detail screen. Approve to show them in the app carousel; use this queue for social/marketing hand-off too.
        </p>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Pending submissions</h2>
                <button class="btn btn-primary" onclick="loadPending()">Refresh</button>
            </div>
            <div id="meta" class="muted" style="margin: .5rem 0;">Loading…</div>
            <div id="loading" class="loading">Loading…</div>
            <div id="table-wrap" class="table-wrap" style="display:none;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Preview</th>
                            <th>Group</th>
                            <th>Sport</th>
                            <th>Uploaded by</th>
                            <th>Submitted</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/dbTarget.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/communitySocialSpotlight.js"></script>
    <script>
        if (!isAuthenticated()) {
            navigate('/login');
        } else {
            const admin = getCurrentAdmin();
            if (admin) {
                document.getElementById('admin-name').textContent = admin.name || admin.email || 'Admin';
            }
            loadPending();
        }
    </script>
</body>
</html>
