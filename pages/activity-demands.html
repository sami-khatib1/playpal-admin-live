<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Demand - PlayPal Admin</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .table-wrap {
            overflow: auto;
            max-height: 70vh;
        }
        .answers-cell {
            max-width: 520px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .toolbar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .muted { color: var(--color-text-secondary); font-size: 0.9rem; }
        .actions-inline { display: flex; gap: 0.5rem; align-items: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Activity Demand</h1>
        <div class="header-actions">
            <span id="admin-name" style="color: var(--color-text); font-weight: 500; margin-right: 1rem;"></span>
            <button class="btn btn-secondary" onclick="navigate('/dashboard')">Back to Dashboard</button>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div id="error-message" class="error" style="display: none;"></div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Can&apos;t find a game? — requests</h2>
                <button class="btn btn-primary" onclick="loadActivityDemands()">Refresh</button>
            </div>

            <div class="toolbar">
                <div id="meta" class="muted">Loading…</div>
                <div class="actions-inline">
                    <button class="btn btn-secondary" onclick="prevPage()">Prev</button>
                    <span id="page-info" class="muted">Page 1</span>
                    <button class="btn btn-secondary" onclick="nextPage()">Next</button>
                </div>
            </div>

            <div id="loading" class="loading">Loading requests...</div>
            <div id="table-wrap" class="table-wrap" style="display:none;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Created</th>
                            <th>User</th>
                            <th>Form answers</th>
                        </tr>
                    </thead>
                    <tbody id="demand-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/dbTarget.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/sportLabels.js"></script>
    <script src="../js/activityDemands.js"></script>
    <script>
        if (!isAuthenticated()) {
            navigate('/login');
        } else {
            const admin = getCurrentAdmin();
            if (admin) {
                document.getElementById('admin-name').textContent = admin.name || admin.email || 'Admin';
            }
            initActivityDemandsPage();
        }
    </script>
</body>
</html>
