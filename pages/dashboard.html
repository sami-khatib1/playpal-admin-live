<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PlayPal Admin</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div class="header">
        <h1>PlayPal Admin Dashboard</h1>
        <div class="header-actions">
            <span id="admin-name" style="color: var(--color-text); font-weight: 500; margin-right: 1rem;"></span>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="container">
        <div class="dashboard-grid">
            <div class="dashboard-card" onclick="navigate('/venue-requests')">
                <h2>Venue Requests</h2>
                <p>Manage and review venue submission requests</p>
                <div class="card-action">View Requests →</div>
            </div>
            
            <div class="dashboard-card" style="opacity: 0.6;">
                <h2>Users</h2>
                <p>Manage user accounts (Coming soon)</p>
            </div>
            
            <div class="dashboard-card" style="opacity: 0.6;">
                <h2>Games</h2>
                <p>View and manage games (Coming soon)</p>
            </div>
            
            <div class="dashboard-card" style="opacity: 0.6;">
                <h2>Debates</h2>
                <p>Moderate debates (Coming soon)</p>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Check authentication
        if (!isAuthenticated()) {
            navigate('/login');
        } else {
            // Display admin name
            const admin = getCurrentAdmin();
            if (admin) {
                document.getElementById('admin-name').textContent = admin.name || admin.email || 'Admin';
            }
        }
    </script>
</body>
</html>
